services:
  local-db:
    image: postgres:15.5
    container_name: cs_agent_postgres
    environment:
      POSTGRES_DB: cs-agent-db
      POSTGRES_USER: orbio
      POSTGRES_PASSWORD: ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cs-agent-db"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
